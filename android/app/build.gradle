apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native and Expo configuration
 */
react {
    /* The entry JS file */
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", rootDir.absolutePath, "android", "absolute"].execute(null, rootDir).text.trim())
    /* Enable hermes */
    hermesEnabled = (findProperty('hermesEnabled') ?: true).toBoolean()
    /* Bundle command - use expo's bundler for bare workflow */
    bundleCommand = "export:embed"
    /* Auto-link all libraries */
    autolinkLibrariesWithApp()
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion
    namespace "com.mobilecloud"

    defaultConfig {
        applicationId "com.mobilecloud"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation("androidx.appcompat:appcompat:1.6.1")
}
