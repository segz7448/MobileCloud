name: Build MobileCloud APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Show settings.gradle
        run: |
          echo "=== android/settings.gradle ==="
          cat android/settings.gradle
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache
          echo "Bundle: $(wc -c < android/app/src/main/assets/index.android.bundle) bytes"

      - name: Build APK
        run: |
          set -o pipefail
          cd android
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle_full.txt

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.run_number }}
          path: /tmp/gradle_full.txt
          retention-days: 7

      - name: Find and stage APK
        run: |
          echo "=== Build output tree ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "outputs dir not found"
          echo "=== All APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "no apk files"

          APK=""
          for candidate in \
            "android/app/build/outputs/apk/debug/app-debug.apk" \
            "android/app/build/outputs/apk/release/app-release.apk" \
            "android/app/build/outputs/apk/release/app-release-unsigned.apk"; do
            if [ -f "$candidate" ]; then
              APK="$candidate"
              break
            fi
          done

          if [ -z "$APK" ]; then
            APK=$(find android/app/build -name "*.apk" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi

          echo "Found: $APK ($(wc -c < "$APK") bytes)"
          mkdir -p output
          cp "$APK" output/MobileCloud-v${{ github.run_number }}.apk
          echo "APK_PATH=output/MobileCloud-v${{ github.run_number }}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MobileCloud v1.0.${{ github.run_number }}
          files: ${{ env.APK_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
