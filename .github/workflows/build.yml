name: Build MobileCloud APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --output ./MobileCloud.apk
      - uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: ./MobileCloud.apk
          retention-days: 30
