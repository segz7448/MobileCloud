name: Build MobileCloud APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write Android local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Write settings.gradle
        run: |
          printf 'pluginManagement {\n    includeBuild("../node_modules/@react-native/gradle-plugin")\n}\nplugins { id("com.facebook.react.settings") }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = '"'"'mobilecloud'"'"'\ninclude '"'"':app'"'"'\nincludeBuild("../node_modules/@react-native/gradle-plugin")\n' > android/settings.gradle
          cat android/settings.gradle

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: List Gradle tasks for :app
        run: |
          cd android
          ./gradlew :app:tasks --all --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g" 2>&1 | grep -E "(assemble|bundle|package)" | head -30 || true

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            --rerun-tasks \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | grep -E "(BUILD|FAILURE|SUCCESS|APK|apk|Error|error:|Caused by)" | tail -60
          echo "=== Exit code: $? ==="
          echo "=== Full filesystem APK search ==="
          find / -name "*.apk" -type f 2>/dev/null | grep -v proc || echo "No APKs anywhere"
          echo "=== android/app/build exists? ==="
          ls -la android/app/build/ 2>/dev/null || echo "No build dir"
          echo "=== android/app/build/outputs? ==="
          find android/app/build -type f 2>/dev/null | head -50 || echo "Empty"

      - name: Find and verify APK
        run: |
          APK_PATH=$(find / -name "*.apk" -type f 2>/dev/null | grep -v proc | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK produced anywhere on filesystem"
            exit 1
          fi
          echo "APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Copy APK to output
        run: |
          mkdir -p output
          find / -name "*.apk" -type f 2>/dev/null | grep -v proc | head -1 | xargs -I{} cp {} output/MobileCloud-v${{ github.run_number }}.apk
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: output/MobileCloud-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MobileCloud v1.0.${{ github.run_number }}
          files: output/MobileCloud-v${{ github.run_number }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
