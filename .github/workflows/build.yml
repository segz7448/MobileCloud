name: Build MobileCloud APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write Android local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "local.properties written:"
          cat android/local.properties

      - name: Write settings.gradle
        run: |
          cat > android/settings.gradle << 'SGEOF'
pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'mobilecloud'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
SGEOF
          echo "=== settings.gradle ==="
          cat android/settings.gradle

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Bundle JS (React Native)
        run: |
          mkdir -p android/app/src/main/assets
          node node_modules/.bin/react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache
          ls -lh android/app/src/main/assets/

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Find and verify APK
        run: |
          echo "=== Searching for APKs ==="
          find android -name "*.apk" -type f
          APK_COUNT=$(find android -name "*.apk" -type f | wc -l)
          echo "Found $APK_COUNT APK(s)"
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK was produced by Gradle!"
            find android/app/build -type f 2>/dev/null | head -50 || echo "No build output dir"
            exit 1
          fi
          find android -name "*.apk" -exec ls -lh {} \;

      - name: Copy APK to output
        run: |
          mkdir -p output
          find android -name "*.apk" -type f -exec cp {} output/MobileCloud-v${{ github.run_number }}.apk \;
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: output/MobileCloud-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MobileCloud v1.0.${{ github.run_number }}
          files: output/MobileCloud-v${{ github.run_number }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
