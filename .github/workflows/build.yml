name: Build MobileCloud APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Write settings.gradle
        run: |
          printf 'pluginManagement {\n    includeBuild("../node_modules/@react-native/gradle-plugin")\n}\nplugins { id("com.facebook.react.settings") }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = '"'"'mobilecloud'"'"'\ninclude '"'"':app'"'"'\nincludeBuild("../node_modules/@react-native/gradle-plugin")\n' > android/settings.gradle

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache
          echo "Bundle: $(wc -c < android/app/src/main/assets/index.android.bundle) bytes"

      - name: List available Gradle tasks
        run: |
          cd android
          ./gradlew :app:tasks --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            2>/dev/null | grep -E "^[a-z].*Debug" | head -30 || true

      - name: Build Debug APK
        run: |
          set -e
          cd android
          ./gradlew :app:packageDebug :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.txt
          echo "=== EXIT: $? ==="
          echo "=== Last 100 lines ==="
          tail -100 /tmp/gradle.txt
          echo "=== build outputs ==="
          find app/build/outputs -type f 2>/dev/null | sort || echo "No outputs dir"

      - name: Find APK
        run: |
          echo "=== searching android/ ==="
          find android -name "*.apk" 2>/dev/null
          APK=$(find android -name "*.apk" -type f | sort -k1,1 -t/ | head -1)
          if [ -z "$APK" ]; then
            echo "=== searching everywhere (depth 10) ==="
            find / -maxdepth 10 -name "*.apk" -type f 2>/dev/null | grep -v proc | grep -v toolcache | grep -v "/usr/"
            APK=$(find / -maxdepth 10 -name "*.apk" -type f 2>/dev/null | grep -v proc | grep -v toolcache | grep -v "/usr/" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found. Gradle log tail:"
            tail -150 /tmp/gradle.txt
            exit 1
          fi
          echo "APK: $APK ($(wc -c < "$APK") bytes)"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Copy and upload
        run: |
          mkdir -p output
          cp "$APK_PATH" output/MobileCloud-v${{ github.run_number }}.apk
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: output/MobileCloud-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MobileCloud v1.0.${{ github.run_number }}
          files: output/MobileCloud-v${{ github.run_number }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
