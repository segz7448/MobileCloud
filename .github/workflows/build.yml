name: Build MobileCloud APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Gradle fresh
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q gradle-8.6-bin.zip
          sudo mv gradle-8.6 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Verify Gradle
        run: gradle --version

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        run: |
          gradle -p android assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          ANDROID_HOME: /usr/local/lib/android/sdk

      - uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
