name: Build MobileCloud APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Write settings.gradle
        run: |
          printf 'pluginManagement {\n    includeBuild("../node_modules/@react-native/gradle-plugin")\n}\nplugins { id("com.facebook.react.settings") }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = '"'"'mobilecloud'"'"'\ninclude '"'"':app'"'"'\nincludeBuild("../node_modules/@react-native/gradle-plugin")\n' > android/settings.gradle

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache
          BUNDLE_SIZE=$(wc -c < android/app/src/main/assets/index.android.bundle)
          echo "✓ Bundle: $BUNDLE_SIZE bytes"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Gradle exit code: $EXIT_CODE ==="
          echo "=== APK-related lines from Gradle ==="
          grep -i "apk\|output\|assemble\|sign\|packag" /tmp/gradle.txt | tail -30
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "=== ERRORS ==="
            grep -E "FAILED|error:|Caused by:" /tmp/gradle.txt | head -20
            exit $EXIT_CODE
          fi

      - name: Find APK (everywhere)
        run: |
          echo "=== APKs in android/ ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "None"
          echo "=== APKs in /home ==="
          find /home -name "*.apk" -type f 2>/dev/null || echo "None"
          echo "=== APKs in /tmp ==="
          find /tmp -name "*.apk" -type f 2>/dev/null || echo "None"
          echo "=== APKs in /root ==="
          find /root -name "*.apk" -type f 2>/dev/null || echo "None"
          echo "=== android/app/build/ structure ==="
          find android/app/build -type f 2>/dev/null | sort | head -50
          echo "=== Searching everything ==="
          APK=$(find / -name "*.apk" -type f 2>/dev/null | grep -v proc | grep -v "^/usr" | grep -v "^/opt/hostedtoolcache" | head -5)
          echo "Found: $APK"
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found anywhere"
            exit 1
          fi
          REAL_APK=$(echo "$APK" | head -1)
          echo "APK_PATH=$REAL_APK" >> $GITHUB_ENV
          ls -lh "$REAL_APK"

      - name: Copy and upload
        run: |
          mkdir -p output
          cp "$APK_PATH" output/MobileCloud-v${{ github.run_number }}.apk
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: output/MobileCloud-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MobileCloud v1.0.${{ github.run_number }}
          files: output/MobileCloud-v${{ github.run_number }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
