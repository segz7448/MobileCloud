name: Build MobileCloud APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          echo "Node: $(node --version), NPM: $(npm --version)"
          echo "Expo CLI: $(npx expo --version 2>/dev/null || echo 'not found')"
          echo "RN CLI: $(npx react-native --version 2>/dev/null || echo 'not found')"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ANDROID_HOME=$ANDROID_HOME"
          cat android/local.properties

      - name: Write settings.gradle
        run: |
          printf 'pluginManagement {\n    includeBuild("../node_modules/@react-native/gradle-plugin")\n}\nplugins { id("com.facebook.react.settings") }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = '"'"'mobilecloud'"'"'\ninclude '"'"':app'"'"'\nincludeBuild("../node_modules/@react-native/gradle-plugin")\n' > android/settings.gradle
          cat android/settings.gradle

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JS (try expo first, fallback to react-native)
        run: |
          BUNDLE_OUT="android/app/src/main/assets/index.android.bundle"
          ASSETS_DEST="android/app/src/main/res"

          echo "=== Attempting expo export:embed ==="
          if npx expo export:embed \
            --platform android \
            --entry-file index.js \
            --bundle-output "$BUNDLE_OUT" \
            --assets-dest "$ASSETS_DEST" \
            --dev false 2>&1; then
            echo "expo export:embed succeeded"
          else
            echo "expo export:embed failed, trying react-native bundle..."
            npx react-native bundle \
              --platform android \
              --dev false \
              --entry-file index.js \
              --bundle-output "$BUNDLE_OUT" \
              --assets-dest "$ASSETS_DEST" \
              --config metro.config.js \
              --reset-cache 2>&1
          fi

          if [ -f "$BUNDLE_OUT" ]; then
            SIZE=$(wc -c < "$BUNDLE_OUT")
            echo "✓ Bundle created: $SIZE bytes"
            if [ "$SIZE" -lt 10000 ]; then
              echo "ERROR: Bundle too small ($SIZE bytes)"
              exit 1
            fi
          else
            echo "ERROR: No bundle file created"
            exit 1
          fi

      - name: Build Debug APK
        run: |
          cd android
          echo "=== Starting Gradle assembleDebug ==="
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            --rerun-tasks \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle_output.txt | tail -80
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Gradle exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "=== GRADLE ERRORS ==="
            grep -E "^(FAILURE|error:|Caused by:|> )" /tmp/gradle_output.txt | head -30
            exit $EXIT_CODE
          fi

      - name: Find APK
        run: |
          echo "=== APK search in project ==="
          find . -name "*.apk" -type f 2>/dev/null | grep -v node_modules
          APK=$(find . -name "*.apk" -type f 2>/dev/null | grep -v node_modules | head -1)
          if [ -z "$APK" ]; then
            echo "=== No APK in project dir. Checking build outputs: ==="
            find android/app/build -type f 2>/dev/null | head -30
            echo "=== Gradle output tail ==="
            tail -50 /tmp/gradle_output.txt
            exit 1
          fi
          SIZE=$(wc -c < "$APK")
          echo "APK found: $APK ($SIZE bytes)"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Copy APK to output
        run: |
          mkdir -p output
          cp "$APK_PATH" output/MobileCloud-v${{ github.run_number }}.apk
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileCloud-APK-${{ github.run_number }}
          path: output/MobileCloud-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MobileCloud v1.0.${{ github.run_number }}
          files: output/MobileCloud-v${{ github.run_number }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
